                ctx.fillStyle='#fff';ctx.font=`bold ${size*0.45}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚡',size/2,size*0.38);

            const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
            const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
        }

// ═══════════ SERVICE WORKER + NOTIFICATIONS ═══════════
let swReg=null;

async function registerSW(){
    if(!('serviceWorker' in navigator))return null;
    try{
        swReg=await navigator.serviceWorker.register('sw.js');
        console.log('SW registered');
        return swReg;
    }catch(e){
        console.log('SW failed:',e);
        return null;
    }
}

async function requestNotifPermission(){
    if(!('Notification' in window))return false;
    if(Notification.permission==='granted')return true;
    if(Notification.permission==='denied')return false;
    const r=await Notification.requestPermission();
    return r==='granted';
}

function sendNotification(title,body){
    if(Notification.permission!=='granted')return;
    
    // Try Service Worker notification (works on mobile)
    if(swReg){
        swReg.showNotification(title,{
            body,
            icon:window.icon192||'',
            badge:window.icon192||'',
            vibrate:[200,100,200],
            tag:'yks-'+Date.now(),
            renotify:true
        }).catch(()=>{
            // Fallback to regular notification (works on desktop)
            try{new Notification(title,{body,icon:window.icon192||''})}catch(e){}
        });
    }else{
        try{new Notification(title,{body,icon:window.icon192||''})}catch(e){}
    }
}

// ═══════════ NOTIFICATION SCHEDULER ═══════════
function checkNotifications(sessions,tasks){
    const now=new Date();const h=now.getHours();const m=now.getMinutes();
    const today=td();
    const tQ=sessions.filter(s=>s.date===today).reduce((a,s)=>a+(parseInt(s.qc||s.questionCount)||0),0);
    const lastKey=localStorage.getItem('yksos_lastNotifKey')||'';
    const key=`${today}-${h}`;
    if(lastKey===key)return;
    
    const yksGun=Math.ceil((new Date('2027-06-19')-now)/864e5);
    const streak=(()=>{let s=0;const d=new Date();while(true){const ds=d.toISOString().split('T')[0];const has=sessions.some(x=>x.date===ds);if(!has&&ds!==today)break;if(has)s++;d.setDate(d.getDate()-1)}return s})();

    if(h===8&&m<10){sendNotification('☀️ Günaydın!',`YKS'ye ${yksGun} gün! Bugün 120 soru çöz 💪`);localStorage.setItem('yksos_lastNotifKey',key)}
    else if(h===12&&m<10){sendNotification('🕐 Öğle Kontrolü',tQ<30?`Henüz ${tQ} soru. Hızlan! 🚀`:`${tQ} soru, güzel! 👏`);localStorage.setItem('yksos_lastNotifKey',key)}
    else if(h===16&&m>=10&&m<=20){sendNotification('📚 Çalışma Zamanı!',`Kitapları aç! Bugün: ${tQ}/120 soru 📝`);localStorage.setItem('yksos_lastNotifKey',key)}
    else if(h===19&&m<10){sendNotification(tQ<80?'⚠️ Hedef Geride!':'🔥 Harika!',tQ<80?`${tQ} soru. Min 80 yakala!`:`${tQ} soru çözdün!`);localStorage.setItem('yksos_lastNotifKey',key)}
    else if(h===21&&m>=25&&m<=35){sendNotification('📝 Günlük Değerlendirme',`Bugünü değerlendir! ${tQ} soru çözdün.`);localStorage.setItem('yksos_lastNotifKey',key)}
    else if(h===23&&m<10){sendNotification('🌙 İyi Geceler',tQ>0?`${tQ} soru! Streak: ${streak} 🔥`:'😴 Streak tehlikede! 1 soru çöz!');localStorage.setItem('yksos_lastNotifKey',key)}
}

const Card=({children,className='',title,subtitle,action})=>(<div className={`bg-dark-800 border border-dark-600 rounded-2xl p-4 fade-in ${className}`}>{(title||action)&&<div className="flex justify-between items-start mb-3">{title&&<div><h3 className="text-base font-semibold text-white">{title}</h3>{subtitle&&<p className="text-xs text-gray-500 mt-0.5">{subtitle}</p>}</div>}{action}</div>}{children}</div>);

const CircleProgress=({value,max,color,size=120,label,sublabel})=>{const pct=max>0?Math.min(value/max*100,100):0;const r=(size-12)/2;const c=2*Math.PI*r;const off=c-(pct/100)*c;const ctr=size/2;return(<div className="text-center"><svg width={size} height={size} className="mx-auto"><circle cx={ctr} cy={ctr} r={r} fill="none" stroke="#1a1a2e" strokeWidth="8"/><circle cx={ctr} cy={ctr} r={r} fill="none" stroke={color} strokeWidth="8" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" className="progress-ring" transform={`rotate(-90 ${ctr} ${ctr})`}/><text x={ctr} y={ctr-6} textAnchor="middle" fill="white" fontSize="18" fontWeight="bold">{value}</text><text x={ctr} y={ctr+12} textAnchor="middle" fill="#666" fontSize="10">/{max}</text></svg>{label&&<div className="text-sm font-medium text-white mt-1">{label}</div>}{sublabel&&<div className="text-xs text-gray-500">{sublabel}</div>}</div>)};
const Heatmap=({sessions})=>{const cells=[];const now=new Date();for(let i=90;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().split('T')[0];const mins=sessions.filter(s=>s.date===ds).reduce((a,s)=>a+(parseInt(s.dur||s.duration)||0),0);let l=0;if(mins>0)l=1;if(mins>=60)l=2;if(mins>=120)l=3;if(mins>=180)l=4;cells.push(<div key={ds} className="heatmap-cell w-2.5 h-2.5 rounded-sm cursor-pointer" style={{backgroundColor:['#1a1a2e','#2d4a3e','#3d6b4f','#4d8c5f','#5dad6f'][l]}} title={`${fdf(ds)}: ${mins}dk`}/>)}return <div className="flex flex-wrap gap-0.5">{cells}</div>};
const Pomodoro=({onComplete})=>{const[mode,setMode]=useState('focus');const[tl,setTl]=useState(25*60);const[run,setRun]=useState(false);const[done,setDone]=useState(0);const ref=useRef(null);useEffect(()=>{if(run&&tl>0)ref.current=setInterval(()=>setTl(t=>t-1),1000);else if(tl===0){if(mode==='focus'){setDone(d=>d+1);onComplete&&onComplete(25);setMode('break');setTl(5*60)}else{setMode('focus');setTl(25*60)}setRun(false)}return()=>clearInterval(ref.current)},[run,tl,mode]);const fmt=s=>`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;const tot=mode==='focus'?25*60:5*60;return(<div className="text-center"><div className="text-xs text-gray-500 uppercase mb-2">{mode==='focus'?'🎯 Odaklan':'☕ Mola'}</div><CircleProgress value={Math.ceil(tl/60)} max={Math.ceil(tot/60)} color={mode==='focus'?'#6c63ff':'#00c853'} size={130} label={fmt(tl)}/><div className="flex justify-center gap-3 mt-3"><Btn onClick={()=>setRun(!run)} v={run?'danger':'primary'}>{run?'⏸️':'▶️'}</Btn><Btn onClick={()=>{setTl(tot);setRun(false)}} v="ghost">🔄</Btn></div><div className="mt-2 text-sm text-gray-500">Bugün: <span className="text-accent font-bold">{done}</span> 🍅</div></div>)};

// In-App Notification Banner
const NotifBanner=({msg,show,onClose})=>(
    <div className={`fixed top-0 left-0 right-0 z-[70] transition-all duration-400 ${show?'translate-y-0 opacity-100':'-translate-y-full opacity-0 pointer-events-none'}`}>
        <div className="bg-accent/95 text-white px-4 py-3 flex items-center justify-between notif-banner">
            <span className="text-sm font-medium">{msg}</span>
            <button onClick={onClose} className="text-white/80 hover:text-white text-lg ml-2">×</button>
        </div>
    </div>
);

// ═══════════ MAIN APP ═══════════
const App=()=>{
    const[pg,setPg]=useState('dashboard');
    const[toast,setToast]=useState({show:false,msg:''});
    const[modal,setModal]=useState({open:false,type:null});
    const[notifEnabled,setNotifEnabled]=useState(S.g('notifEnabled',false));
    const[banner,setBanner]=useState({show:false,msg:''});

    const[sessions,setSessions]=useState(S.g('sessions',[]));

    useEffect(()=>{S.s('reflections',reflections)},[reflections]);
    useEffect(()=>{S.s('dailyLogs',dailyLogs)},[dailyLogs]);
    useEffect(()=>{S.s('goals',goals)},[goals]);
    useEffect(()=>{S.s('tasks',tasks)},[tasks]);
    useEffect(()=>{S.s('xp',xp)},[xp]);
    useEffect(()=>{S.s('pyDone',pyDone)},[pyDone]);
    useEffect(()=>{S.s('notifEnabled',notifEnabled)},[notifEnabled]);

    // Auto tasks
    useEffect(()=>{const t=td();if(!tasks.some(x=>x.date===t))setTasks(p=>[...p,...genTasks(t)])},[]);

    // Notification checker
    useEffect(()=>{
        if(!notifEnabled)return;

    // Show in-app banner on open
    useEffect(()=>{

        else msg=`🌆 ${tQ} soru çözdün. ${tQ>=120?'🏆 Hedefe ulaştın!':tQ>=80?'Az kaldı!':'Biraz daha çalış!'}`;
        setBanner({show:true,msg});
        setTimeout(()=>setBanner({show:false,msg:''}),5000);
    },[]);

    const notify=m=>{setToast({show:true,msg:m});setTimeout(()=>setToast({show:false,msg:''}),2500)};
    const addXp=a=>setXp(p=>p+a);

    const enableNotifs=async()=>{
        const ok=await requestNotifPermission();
        if(ok){
            setNotifEnabled(true);
            notify('🔔 Bildirimler açıldı!');

        }else{

            setTimeout(()=>setBanner({show:false,msg:''}),8000);
        }
    };

    const today=td();
    const tSess=sessions.filter(s=>s.date===today);
    const tMins=tSess.reduce((a,s)=>a+(parseInt(s.dur||s.duration)||0),0);
    const tQ=tSess.reduce((a,s)=>a+(parseInt(s.qc||s.questionCount)||0),0);
    const tTasks=tasks.filter(t=>t.date===today);
    const tTasksDone=tTasks.filter(t=>t.completed).length;
    const streak=(()=>{let s=0;const d=new Date();while(true){const ds=d.toISOString().split('T')[0];const has=sessions.some(x=>x.date===ds);if(!has&&ds!==today)break;if(has)s++;d.setDate(d.getDate()-1)}return s})();
    const sInfo=gs(streak);const lvl=gl(xp);const nLvl=nl(xp);const lvlPct=nLvl.min>lvl.min?((xp-lvl.min)/(nLvl.min-lvl.min))*100:100;
    const mufSt=id=>{const m=MUF.find(x=>x.id===id);if(!m)return{t:0,m:0};const all=[...m.d1,...m.d2];const sp=topics[id]||{};return{t:all.length,m:all.filter(t=>sp[t]==='mastered').length}};
    const totalMuf=()=>{let t=0,m=0;MUF.forEach(x=>{const s=mufSt(x.id);t+=s.t;m+=s.m});return t>0?Math.round(m/t*100):0};
    const qBySub=id=>sessions.filter(s=>s.subject===id).reduce((a,s)=>a+(parseInt(s.qc||s.questionCount)||0),0);
    const weakTopics=()=>{const tm={};mistakes.forEach(m=>{const k=m.subject+'|||'+m.topic;tm[k]=(tm[k]||0)+1});return Object.entries(tm).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,c])=>{const[s,t]=k.split('|||');return{subject:s,topic:t,count:c}})};
    const weekReport=()=>{const days=l7();const ws=sessions.filter(s=>days.includes(s.date));const mins=ws.reduce((a,s)=>a+(parseInt(s.dur||s.duration)||0),0);const q=ws.reduce((a,s)=>a+(parseInt(s.qc||s.questionCount)||0),0);const st={};ws.forEach(s=>{st[s.subject]=(st[s.subject]||0)+(parseInt(s.dur||s.duration)||0)});const sorted=Object.entries(st).sort((a,b)=>b[1]-a[1]);return{mins,q,strong:sorted[0]?SUBS.find(s=>s.id===sorted[0][0])?.name:'—',weak:sorted.length>1?SUBS.find(s=>s.id===sorted[sorted.length-1][0])?.name:'—',tip:mins<600?'⚠️ Çalışma düşük!':mins<1200?'📈 İyi ama daha fazla soru çöz.':'🔥 Harika!'}};
    const goalStatus=tQ>=DG_IDEAL?'ideal':tQ>=DG_MIN?'ok':'low';

    // Handlers
    const addSession=()=>{if(!sF.topic||!sF.dur){notify('⚠️ Konu ve süre!');return}setSessions(p=>[...p,{...sF,id:Date.now(),date:today,duration:sF.dur,questionCount:sF.qc}]);const q=parseInt(sF.qc)||0;let b=5;if(q>=50)b=20;if(q>=100)b=50;if(q>0)addXp(b);setSF({subject:'matematik',topic:'',qc:'',dur:'',correct:'',wrong:'',diff:'orta',focus:'3',energy:'3'});notify(`✅ +${b} XP!`);setModal({open:false,type:null})};
    const addExam=()=>{const tD=parseInt(eF.tD)||0,tY=parseInt(eF.tY)||0,mD=parseInt(eF.mD)||0,mY=parseInt(eF.mY)||0,fD=parseInt(eF.fD)||0,fY=parseInt(eF.fY)||0,sD=parseInt(eF.sD)||0,sY=parseInt(eF.sY)||0;const tN=cn(tD,tY),mN=cn(mD,mY),fN=cn(fD,fY),sN=cn(sD,sY),tot=tN+mN+fN+sN;const weak=[{n:'Türkçe',v:tN},{n:'Mat',v:mN},{n:'Fen',v:fN},{n:'Sos',v:sN}].reduce((a,b)=>a.v<b.v?a:b).n;setExams(p=>[...p,{id:Date.now(),date:today,type:eF.type,tD,tY,tN,mD,mY,mN,fD,fY,fN,sD,sY,sN,tot,weak}]);setEF({type:'TYT',tD:'',tY:'',mD:'',mY:'',fD:'',fY:'',sD:'',sY:''});addXp(25);notify('✅ +25 XP!');setModal({open:false,type:null})};
    const addMistake=()=>{if(!mF.topic||!mF.desc){notify('⚠️!');return}setMistakes(p=>[...p,{...mF,id:Date.now(),date:today,description:mF.desc,correctLogic:mF.logic}]);setMF({subject:'matematik',topic:'',desc:'',logic:'',type:'bilgi'});addXp(5);notify('📕 +5 XP!');setModal({open:false,type:null})};
    const toggleTask=id=>setTasks(p=>p.map(t=>{if(t.id===id&&!t.completed){addXp(t.xp);notify(`✅ +${t.xp} XP!`);return{...t,completed:true}}return t}));
    const handlePomo=m=>{setSessions(p=>[...p,{id:Date.now(),date:today,subject:'genel',topic:'Pomodoro',dur:m,qc:0}]);addXp(15);notify('🍅 +15 XP!')};

    // ═══════════ DASHBOARD ═══════════
    const Dashboard=()=>{
        const wr=weekReport();const lastE=[...exams].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        const c1=useRef(null);const c2=useRef(null);const i1=useRef(null);const i2=useRef(null);
        useEffect(()=>{const days=l7();
            if(c1.current){if(i1.current)i1.current.destroy();i1.current=new Chart(c1.current,{type:'bar',data:{labels:days.map(d=>fd(d)),datasets:[{data:days.map(d=>sessions.filter(s=>s.date===d).reduce((a,s)=>a+(parseInt(s.dur||s.duration)||0),0)),backgroundColor:'#6c63ff88',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#555',font:{size:9}}},x:{ticks:{color:'#555',font:{size:9}}}}}})}
            if(c2.current){if(i2.current)i2.current.destroy();i2.current=new Chart(c2.current,{type:'bar',data:{labels:days.map(d=>fd(d)),datasets:[{data:days.map(d=>sessions.filter(s=>s.date===d).reduce((a,s)=>a+(parseInt(s.qc||s.questionCount)||0),0)),backgroundColor:'#00c85388',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#555',font:{size:9}}},x:{ticks:{color:'#555',font:{size:9}}}}}})}
        },[sessions]);

        return(<div className="space-y-4">
            {!notifEnabled&&<div className="bg-accent/10 border border-accent/30 rounded-2xl p-4 flex flex-col sm:flex-row items-center justify-between gap-3"><div className="flex items-center gap-3"><span className="text-2xl">🔔</span><div><div className="text-sm font-semibold text-white">Bildirimleri Aç!</div><div className="text-xs text-gray-400">Günde 6 hatırlatma: sabah, öğle, akşam...</div></div></div><Btn onClick={enableNotifs} s="sm">🔔 Aç</Btn></div>}

            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <div><h1 className="text-xl font-bold text-white">Merhaba, Mehmet Zeki 👋</h1><p className="text-gray-500 text-xs">İTÜ BM • İlk 1000</p></div>

                    <div className="bg-dark-700 border border-dark-600 rounded-xl px-3 py-2 text-center"><div className="text-xs text-gray-500">{lvl.i} {lvl.n}</div><div className="text-base font-bold text-accent">{xp} XP</div><div className="w-20 bg-dark-900 rounded-full h-1 mt-1"><div className="h-1 rounded-full bg-accent xp-fill" style={{width:`${lvlPct}%`}}/></div></div>
                    <div className="bg-dark-700 border border-dark-600 rounded-xl px-3 py-2 text-center"><span className={`text-xl ${streak>0?'streak-flame':''}`}>🔥</span><div className="text-lg font-bold text-warning">{streak}</div><div className="text-xs text-gray-500">{sInfo.t}</div></div>

                        {goalStatus==='low'&&tMins>0&&<div className="mt-2 bg-danger/10 border border-danger/30 rounded-lg px-3 py-2 text-xs text-danger">⚠️ {tQ} soru. Min: {DG_MIN}!</div>}

                        <div className="flex gap-4 mt-3"><div className="text-center"><div className="text-lg font-bold text-white">{tMins}</div><div className="text-xs text-gray-500">dk</div></div><div className="text-center"><div className="text-lg font-bold text-white">{tQ}</div><div className="text-xs text-gray-500">soru</div></div><div className="text-center"><div className="text-lg font-bold text-accent">{Math.ceil((new Date('2027-06-19')-new Date())/864e5)}</div><div className="text-xs text-gray-500">YKS</div></div></div>
                    </div>
                </div>
            </Card>

            <Card title="✅ Görevler" subtitle={`${tTasksDone}/${tTasks.length}`} action={<Btn onClick={()=>setModal({open:true,type:'task'})} s="sm">+</Btn>}>
                <PBar value={tTasksDone} max={tTasks.length} color="#00c853" label={false} size="sm"/>
                <div className="space-y-2 mt-3">{tTasks.map(t=><div key={t.id} className={`flex items-center gap-3 bg-dark-700 rounded-lg px-3 py-2.5 ${t.completed?'opacity-40':''}`}><input type="checkbox" checked={t.completed} onChange={()=>toggleTask(t.id)} className="w-5 h-5 accent-accent cursor-pointer"/><span className={`text-sm flex-1 ${t.completed?'line-through text-gray-500':'text-white'}`}>{t.text}</span><span className="text-xs text-accent">+{t.xp}</span><button onClick={()=>setTasks(tasks.filter(x=>x.id!==t.id))} className="text-gray-600 hover:text-danger">×</button></div>)}</div>
            </Card>

            <div className="grid md:grid-cols-2 gap-4"><Card title="📊 Süre"><div style={{height:'150px'}}><canvas ref={c1}></canvas></div></Card><Card title="📈 Soru"><div style={{height:'150px'}}><canvas ref={c2}></canvas></div></Card></div>

            <Card title="📋 Haftalık"><div className="grid grid-cols-4 gap-2 mb-3">{[{v:`${Math.round(wr.mins/60)}s`,l:'Çalışma',c:'text-accent'},{v:wr.q,l:'Soru',c:'text-success'},{v:wr.strong,l:'Güçlü',c:'text-warning'},{v:wr.weak,l:'Zayıf',c:'text-danger'}].map((x,i)=><div key={i} className="bg-dark-700 rounded-lg p-2 text-center"><div className={`text-lg font-bold ${x.c}`}>{x.v}</div><div className="text-xs text-gray-500">{x.l}</div></div>)}</div><div className="bg-dark-700 rounded-lg p-3 text-sm">{wr.tip}</div></Card>

            <div className="grid md:grid-cols-2 gap-4">
                <Card title="📚 Müfredat" subtitle={`%${totalMuf()}`}><div className="space-y-2">{MUF.map(m=>{const s=mufSt(m.id);return <div key={m.id} className="flex items-center gap-2"><span className="text-xs w-14 truncate" style={{color:m.color}}>{m.name}</span><div className="flex-1"><PBar value={s.m} max={s.t} color={m.color} label={false} size="sm"/></div><span className="text-xs text-gray-500 w-8 text-right">{s.m}/{s.t}</span></div>})}</div></Card>
                <Card title="🗓️ Harita"><Heatmap sessions={sessions}/></Card>
            </div>

            {weakTopics().length>0&&<Card title="⚠️ Zayıf Konular"><div className="space-y-2">{weakTopics().map((t,i)=><div key={i} className="flex justify-between text-sm"><div><span className="text-xs px-2 py-0.5 rounded-full mr-1" style={{backgroundColor:SUBS.find(s=>s.id===t.subject)?.color+'22',color:SUBS.find(s=>s.id===t.subject)?.color}}>{SUBS.find(s=>s.id===t.subject)?.name}</span>{t.topic}</div><span className="text-danger font-bold">{t.count}×</span></div>)}</div></Card>}

            {notifEnabled&&<Card title="🔔 Bildirimler"><div className="flex flex-wrap gap-2"><Btn onClick={()=>{sendNotification('🔔 Test','Bu bir test bildirimi! 💪');notify('🔔 Gönderildi!')}} v="ghost" s="sm">🔔 Test</Btn><Btn onClick={()=>{setNotifEnabled(false);notify('🔕 Kapatıldı')}} v="danger" s="sm">Kapat</Btn></div><p className="text-xs text-gray-500 mt-2">Saatler: 08:00, 12:00, 16:15, 19:00, 21:30, 23:00</p></Card>}
        </div>);
    };

    // ═══ STUDY ═══
    const StudyPg=()=>(<div className="space-y-4"><div className="flex justify-between items-center"><h1 className="text-xl font-bold text-white">📚 Çalışma</h1><Btn onClick={()=>setModal({open:true,type:'session'})}>+ Ekle</Btn></div><div className="grid md:grid-cols-2 gap-4"><Card title="🍅 Pomodoro"><Pomodoro onComplete={handlePomo}/></Card><Card title="📊 Soru"><div className="grid grid-cols-3 gap-2">{SUBS.slice(0,9).map(s=><div key={s.id} className="bg-dark-700 rounded-lg p-2 text-center"><div className="text-lg font-bold" style={{color:s.color}}>{qBySub(s.id)}</div><div className="text-xs text-gray-500">{s.name}</div></div>)}</div></Card></div><Card title="📋 Son">{sessions.length===0?<p className="text-gray-500 text-center py-4">Yok</p>:<div className="space-y-2 max-h-80 overflow-y-auto">{[...sessions].sort((a,b)=>b.id-a.id).slice(0,20).map(s=><div key={s.id} className="bg-dark-700 rounded-lg p-2.5 flex justify-between"><div><div className="flex items-center gap-2 flex-wrap"><span className="text-xs px-2 py-0.5 rounded-full" style={{backgroundColor:SUBS.find(x=>x.id===s.subject)?.color+'22',color:SUBS.find(x=>x.id===s.subject)?.color}}>{SUBS.find(x=>x.id===s.subject)?.name||s.subject}</span><span className="text-sm">{s.topic}</span></div><div className="text-xs text-gray-500 mt-1">{fd(s.date)} • {s.dur||s.duration}dk • {s.qc||s.questionCount||0} soru</div></div><button onClick={()=>setSessions(sessions.filter(x=>x.id!==s.id))} className="text-gray-600 hover:text-danger">×</button></div>)}</div>}</Card></div>);

    const ExamPg=()=>{const cr=useRef(null);const ci=useRef(null);useEffect(()=>{if(cr.current&&exams.length>0){if(ci.current)ci.current.destroy();const sorted=[...exams].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-10);ci.current=new Chart(cr.current,{type:'line',data:{labels:sorted.map(e=>fd(e.date)),datasets:[{data:sorted.map(e=>e.tot),borderColor:'#6c63ff',backgroundColor:'#6c63ff22',fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#555'}},x:{ticks:{color:'#555'}}}}})}},[exams]);return(<div className="space-y-4"><div className="flex justify-between items-center"><h1 className="text-xl font-bold text-white">📊 Denemeler</h1><Btn onClick={()=>setModal({open:true,type:'exam'})}>+ Ekle</Btn></div><Card title="📈 Trend"><div style={{height:'200px'}}><canvas ref={cr}></canvas></div></Card><Card title="📋 Geçmiş">{exams.length===0?<p className="text-gray-500 text-center py-4">Yok</p>:<div className="space-y-2">{[...exams].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=><div key={e.id} className="bg-dark-700 rounded-lg p-3 flex justify-between"><div><div className="flex items-center gap-2 mb-1"><span className="text-xs px-2 py-0.5 rounded-full bg-accent/20 text-accent">{e.type}</span><span className="text-sm">{fd(e.date)}</span>{e.weak&&<span className="text-xs text-danger">⚠️{e.weak}</span>}</div><div className="flex gap-3 text-xs text-gray-400"><span>T:{e.tN?.toFixed(1)}</span><span>M:{e.mN?.toFixed(1)}</span><span>F:{e.fN?.toFixed(1)}</span><span>S:{e.sN?.toFixed(1)}</span></div></div><div className="text-right"><div className="text-xl font-bold text-accent">{e.tot?.toFixed(1)}</div><button onClick={()=>setExams(exams.filter(x=>x.id!==e.id))} className="text-xs text-gray-600 hover:text-danger">sil</button></div></div>)}</div>}</Card></div>)};

    const MistPg=()=>{const[rv,setRv]=useState(false);const[cur,setCur]=useState(null);const[sa,setSa]=useState(false);const[fil,setFil]=useState('all');const start=()=>{const f=fil==='all'?mistakes:mistakes.filter(m=>m.subject===fil);if(!f.length){notify('⚠️');return}setCur(f[Math.floor(Math.random()*f.length)]);setSa(false);setRv(true)};const filtered=fil==='all'?mistakes:mistakes.filter(m=>m.subject===fil);return(<div className="space-y-4"><div className="flex flex-wrap justify-between items-center gap-2"><h1 className="text-xl font-bold text-white">📕 Kara Defter</h1><div className="flex gap-2"><Btn onClick={start} v="success" s="sm">🔄</Btn><Btn onClick={()=>setModal({open:true,type:'mistake'})} s="sm">+</Btn></div></div>{rv&&cur&&<Card className="glow"><div className="text-center"><span className="text-xs px-3 py-1 rounded-full mb-3 inline-block" style={{backgroundColor:SUBS.find(s=>s.id===cur.subject)?.color+'22',color:SUBS.find(s=>s.id===cur.subject)?.color}}>{SUBS.find(s=>s.id===cur.subject)?.name}</span><h3 className="text-lg font-bold text-white mb-2">{cur.topic}</h3><p className="text-danger mb-4">❌ {cur.desc||cur.description}</p>{sa&&<div className="bg-dark-700 rounded-lg p-3 mb-4"><p className="text-success">✅ {cur.logic||cur.correctLogic||'—'}</p></div>}<div className="flex justify-center gap-2">{!sa&&<Btn onClick={()=>setSa(true)}>Göster</Btn>}<Btn onClick={start} v="ghost">→</Btn><Btn onClick={()=>setRv(false)} v="danger">×</Btn></div></div></Card>}<div className="flex gap-1.5 flex-wrap"><button onClick={()=>setFil('all')} className={`px-2.5 py-1 rounded-full text-xs ${fil==='all'?'bg-accent text-white':'bg-dark-700 text-gray-400'}`}>Tümü</button>{SUBS.map(s=><button key={s.id} onClick={()=>setFil(s.id)} className="px-2.5 py-1 rounded-full text-xs" style={{backgroundColor:fil===s.id?s.color:'#1a1a2e',color:fil===s.id?'#fff':'#9ca3af'}}>{s.name}</button>)}</div><div className="space-y-2">{filtered.length===0?<Card><p className="text-gray-500 text-center py-4">Yok</p></Card>:[...filtered].sort((a,b)=>b.id-a.id).slice(0,20).map(m=><Card key={m.id}><div className="flex justify-between"><div className="flex-1"><div className="flex gap-1.5 mb-1 flex-wrap"><span className="text-xs px-2 py-0.5 rounded-full" style={{backgroundColor:SUBS.find(s=>s.id===m.subject)?.color+'22',color:SUBS.find(s=>s.id===m.subject)?.color}}>{SUBS.find(s=>s.id===m.subject)?.name}</span><span className="text-sm font-semibold">{m.topic}</span><span className="text-xs px-2 py-0.5 rounded-full" style={{backgroundColor:MTYPES.find(t=>t.id===m.type)?.color+'22',color:MTYPES.find(t=>t.id===m.type)?.color}}>{MTYPES.find(t=>t.id===m.type)?.name}</span></div><p className="text-xs text-danger">❌ {m.desc||m.description}</p>{(m.logic||m.correctLogic)&&<p className="text-xs text-success mt-1">✅ {m.logic||m.correctLogic}</p>}</div><button onClick={()=>setMistakes(mistakes.filter(x=>x.id!==m.id))} className="text-gray-600 hover:text-danger ml-1">×</button></div></Card>)}</div></div>)};

    const TopPg=()=>{const[tab,setTab]=useState('matematik');const upd=(s,t,v)=>setTopics(p=>({...p,[s]:{...(p[s]||{}),[t]:v}}));const markAll=(s,l)=>{setTopics(p=>{const u={...p,[s]:{...(p[s]||{})}};l.forEach(t=>{u[s][t]='mastered'});return u});addXp(20);notify('✅ +20 XP!')};const m=MUF.find(x=>x.id===tab);const row=(t,i,s)=>{const st=(topics[s]||{})[t]||'not_started';const info=TSTATUS[st];return <div key={t} className="flex justify-between items-center bg-dark-700 rounded-lg px-3 py-2.5"><div className="flex items-center gap-2"><span className="text-xs text-gray-600 w-5">{i+1}</span><div className="w-2 h-2 rounded-full" style={{backgroundColor:info.c}}/><span className={`text-sm ${st==='mastered'?'line-through text-gray-500':''}`}>{t}</span></div><select value={st} onChange={e=>upd(s,t,e.target.value)} className="text-xs bg-dark-900 border border-dark-600 rounded-lg px-2 py-1" style={{color:info.c}}>{Object.entries(TSTATUS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></div>};return(<div className="space-y-4"><h1 className="text-xl font-bold text-white">📚 Konular</h1><div className="grid grid-cols-3 md:grid-cols-6 gap-1.5">{MUF.map(x=>{const s=mufSt(x.id);const p=s.t>0?Math.round(s.m/s.t*100):0;return <button key={x.id} onClick={()=>setTab(x.id)} className={`rounded-xl p-2.5 border text-left ${tab===x.id?'ring-1':'border-dark-600'}`} style={{backgroundColor:tab===x.id?x.color+'12':'#1a1a2e',borderColor:tab===x.id?x.color:undefined}}><div className="text-xs font-semibold" style={{color:x.color}}>{x.name}</div><div className="text-sm font-bold text-white">{s.m}/{s.t}</div><div className="mt-1 bg-dark-900 rounded-full h-1"><div className="h-1 rounded-full" style={{width:`${p}%`,backgroundColor:x.color}}/></div></button>})}</div>{m&&<div className="space-y-4">{m.d1.length>0&&<Card><div className="flex justify-between items-center mb-3"><h3 className="text-base font-semibold text-white">{m.d1l}</h3><Btn onClick={()=>markAll(m.id,m.d1)} v="success" s="sm">✓</Btn></div><PBar value={m.d1.filter(t=>(topics[m.id]||{})[t]==='mastered').length} max={m.d1.length} color={m.color} label={false} size="sm"/><div className="mt-3 space-y-1.5">{m.d1.map((t,i)=>row(t,i,m.id))}</div></Card>}{m.d2.length>0&&m.d2l&&<Card><div className="flex justify-between items-center mb-3"><div className="flex items-center gap-2"><h3 className="text-base font-semibold text-white">{m.d2l}</h3><span className="text-xs px-2 py-0.5 rounded-full bg-warning/20 text-warning">📍</span></div><Btn onClick={()=>markAll(m.id,m.d2)} v="success" s="sm">✓</Btn></div><PBar value={m.d2.filter(t=>(topics[m.id]||{})[t]==='mastered').length} max={m.d2.length} color={m.color} label={false} size="sm"/><div className="mt-3 space-y-1.5">{m.d2.map((t,i)=>row(t,i,m.id))}</div></Card>}</div>}</div>)};

    const RefPg=()=>{const[rF2,setRF2]=useState({hard:'',best:'',hours:'',focus:''});const[dF2,setDF2]=useState({learned:'',hard:'',tomorrow:''});return(<div className="space-y-4"><h1 className="text-xl font-bold text-white">📝 Değerlendirme</h1><div className="grid md:grid-cols-2 gap-4"><Card title="📅 Haftalık"><div className="space-y-3"><Sel label="En zor" value={rF2.hard} onChange={v=>setRF2(p=>({...p,hard:v}))} options={[{value:'',label:'Seç...'},...SUBS.map(s=>({value:s.id,label:s.name}))]}/>
    <Sel label="En iyi" value={rF2.best} onChange={v=>setRF2(p=>({...p,best:v}))} options={[{value:'',label:'Seç...'},...SUBS.map(s=>({value:s.id,label:s.name}))]}/>
    <Inp label="Saat" type="number" value={rF2.hours} onChange={v=>setRF2(p=>({...p,hours:v}))}/>
    <Txt label="Odak" value={rF2.focus} onChange={v=>setRF2(p=>({...p,focus:v}))} rows={2}/>
    <Btn onClick={()=>{if(!rF2.hard){notify('⚠️');return}setReflections(p=>[...p,{...rF2,id:Date.now(),date:today,week:wn(new Date())}]);setRF2({hard:'',best:'',hours:'',focus:''});addXp(10);notify('✅ +10 XP!')}} className="w-full">Kaydet</Btn></div></Card>
    <Card title="🌙 Günlük"><div className="space-y-3"><Txt label="Ne öğrendim?" value={dF2.learned} onChange={v=>setDF2(p=>({...p,learned:v}))} rows={2}/>
    <Inp label="En zor" value={dF2.hard} onChange={v=>setDF2(p=>({...p,hard:v}))}/>
    <Txt label="Yarın" value={dF2.tomorrow} onChange={v=>setDF2(p=>({...p,tomorrow:v}))} rows={2}/>
    <Btn onClick={()=>{if(!dF2.learned){notify('⚠️');return}setDailyLogs(p=>[...p,{...dF2,id:Date.now(),date:today}]);setDF2({learned:'',hard:'',tomorrow:''});addXp(10);notify('✅ +10 XP!')}} className="w-full">Kaydet</Btn></div></Card></div></div>)};

    const GoalPg=()=>(<div className="space-y-4"><h1 className="text-xl font-bold text-white">🎯 Hedefler</h1><Card title="Net Hedefleri"><div className="grid grid-cols-3 md:grid-cols-5 gap-2 mb-3">{SUBS.map(s=><Inp key={s.id} label={s.name} type="number" value={goals[s.id]||''} onChange={v=>setGoals(p=>({...p,[s.id]:parseInt(v)||0}))}/>)}</div><Btn onClick={()=>notify('✅ Kaydedildi!')}>Kaydet</Btn></Card><Card title="⏰ YKS"><div className="grid grid-cols-3 gap-3 text-center"><div><div className="text-3xl font-bold text-accent">{Math.ceil((new Date('2027-06-19')-new Date())/864e5)}</div><div className="text-xs text-gray-500">Gün</div></div><div><div className="text-3xl font-bold text-accent">{Math.ceil((new Date('2027-06-19')-new Date())/(864e5*7))}</div><div className="text-xs text-gray-500">Hafta</div></div><div><div className="text-3xl font-bold text-accent">{Math.round((new Date('2027-06-19')-new Date())/(864e5*30))}</div><div className="text-xs text-gray-500">Ay</div></div></div></Card><Card title={`${lvl.i} ${lvl.n}`}><PBar value={xp-lvl.min} max={nLvl.min-lvl.min} color="#6c63ff" label={false} size="lg"/><div className="grid grid-cols-5 gap-1 mt-3">{LEVELS.map((l,i)=><div key={i} className={`rounded-lg p-1 text-center text-xs border ${xp>=l.min?'border-accent bg-accent/10 text-accent':'border-dark-600 text-gray-700'}`}><div>{l.i}</div><div>{l.n}</div></div>)}</div></Card></div>);

    const PyPg=()=>(<div className="space-y-4"><h1 className="text-xl font-bold text-white">🐍 Python</h1><PBar value={pyDone.length} max={PY_CH.length} color="#ffd600" label={false} size="lg"/><div className="grid md:grid-cols-2 gap-3">{PY_CH.map(ch=>{const done=pyDone.includes(ch.id);return <Card key={ch.id} className={done?'opacity-50':''}><div className="flex justify-between"><div className="flex-1"><div className="flex items-center gap-2 mb-1"><span className={`text-xs px-2 py-0.5 rounded-full ${ch.df==='Kolay'?'bg-success/20 text-success':ch.df==='Orta'?'bg-warning/20 text-warning':'bg-danger/20 text-danger'}`}>{ch.df}</span><span className="text-xs text-accent">+{ch.xp}</span></div><h3 className={`text-sm font-semibold ${done?'line-through text-gray-500':'text-white'}`}>{ch.t}</h3><p className="text-xs text-gray-400 mt-1">{ch.d}</p></div><Btn onClick={()=>{if(!done){setPyDone(p=>[...p,ch.id]);addXp(ch.xp);notify(`🐍 +${ch.xp} XP!`)}}} v={done?'ghost':'success'} s="sm" disabled={done}>{done?'✅':'Bitir'}</Btn></div></Card>})}</div></div>);

    // NAV
    const pages={dashboard:Dashboard,study:StudyPg,exams:ExamPg,mistakes:MistPg,topics:TopPg,reflection:RefPg,goals:GoalPg,python:PyPg};
    const Pg=pages[pg];
    const nav=[{id:'dashboard',i:'📊',l:'Panel'},{id:'study',i:'📚',l:'Çalış'},{id:'exams',i:'📝',l:'Deneme'},{id:'mistakes',i:'📕',l:'Defter'},{id:'topics',i:'✅',l:'Konu'},{id:'reflection',i:'💭',l:'Günlük'},{id:'goals',i:'🎯',l:'Hedef'},{id:'python',i:'🐍',l:'Python'}];

    return(<div className="min-h-screen">
        <NotifBanner msg={banner.msg} show={banner.show} onClose={()=>setBanner({show:false,msg:''})}/>

        <nav className="hidden md:flex fixed left-0 top-0 bottom-0 w-44 bg-dark-800 border-r border-dark-600 flex-col z-40">
            <div className="p-3 border-b border-dark-600"><div className="text-lg font-bold text-accent">⚡ YKS Merkezi</div></div>
            <div className="flex-1 py-2">{nav.map(n=><button key={n.id} onClick={()=>setPg(n.id)} className={`w-full flex items-center gap-3 px-3 py-2.5 text-left ${pg===n.id?'bg-accent/10 text-accent border-r-2 border-accent':'text-gray-400 hover:text-white hover:bg-dark-700'}`}><span>{n.i}</span><span className="text-sm">{n.l}</span></button>)}</div>
            <div className="p-3 border-t border-dark-600"><div className="text-xs text-gray-600">Mehmet Zeki • {lvl.i} {xp} XP</div>{notifEnabled&&<div className="text-xs text-success mt-1">🔔 Aktif</div>}</div>
        </nav>

        <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-dark-800 border-t border-dark-600 flex z-50">
            {nav.map(n=><button key={n.id} onClick={()=>setPg(n.id)} className={`flex-1 flex flex-col items-center py-2 ${pg===n.id?'text-accent':'text-gray-500'}`}><span className="text-base">{n.i}</span><span style={{fontSize:'10px'}} className="mt-0.5">{n.l}</span></button>)}
        </nav>

        <main className="md:ml-44 p-4 pb-20 md:pb-6"><Pg/></main>

        <Modal isOpen={modal.open&&modal.type==='session'} onClose={()=>setModal({open:false,type:null})} title="📚 Çalışma Ekle">
            <div className="space-y-3"><Sel label="Ders" value={sF.subject} onChange={v=>setSF(p=>({...p,subject:v}))} options={SUBS.map(s=>({value:s.id,label:s.name}))}/><Inp label="Konu" value={sF.topic} onChange={v=>setSF(p=>({...p,topic:v}))} placeholder="Konu..."/><div className="grid grid-cols-2 gap-2"><Inp label="Süre (dk)" type="number" value={sF.dur} onChange={v=>setSF(p=>({...p,dur:v}))}/><Inp label="Soru" type="number" value={sF.qc} onChange={v=>setSF(p=>({...p,qc:v}))}/></div><div className="grid grid-cols-2 gap-2"><Inp label="Doğru" type="number" value={sF.correct} onChange={v=>setSF(p=>({...p,correct:v}))}/><Inp label="Yanlış" type="number" value={sF.wrong} onChange={v=>setSF(p=>({...p,wrong:v}))}/></div><Btn onClick={addSession} className="w-full">Kaydet</Btn></div>
        </Modal>

        <Modal isOpen={modal.open&&modal.type==='exam'} onClose={()=>setModal({open:false,type:null})} title="📝 Deneme Ekle">
            <div className="space-y-3"><Sel label="Tür" value={eF.type} onChange={v=>setEF(p=>({...p,type:v}))} options={[{value:'TYT',label:'TYT'},{value:'AYT',label:'AYT'}]}/>
            {[{l:'Türkçe',d:'tD',y:'tY'},{l:'Mat',d:'mD',y:'mY'},{l:'Fen',d:'fD',y:'fY'},{l:'Sosyal',d:'sD',y:'sY'}].map(x=><div key={x.l} className="grid grid-cols-3 gap-2 items-end"><div className="text-xs text-gray-400 py-2">{x.l}</div><Inp label="D" type="number" value={eF[x.d]} onChange={v=>setEF(p=>({...p,[x.d]:v}))}/><Inp label="Y" type="number" value={eF[x.y]} onChange={v=>setEF(p=>({...p,[x.y]:v}))}/></div>)}
            <div className="bg-dark-700 rounded-lg p-2 grid grid-cols-5 text-center text-xs">{[{n:'T',d:'tD',y:'tY'},{n:'M',d:'mD',y:'mY'},{n:'F',d:'fD',y:'fY'},{n:'S',d:'sD',y:'sY'}].map(x=><div key={x.n}><div className="text-gray-500">{x.n}</div><div className="text-white font-bold">{cn(parseInt(eF[x.d])||0,parseInt(eF[x.y])||0).toFixed(1)}</div></div>)}<div><div className="text-gray-500">Σ</div><div className="text-accent font-bold">{(cn(parseInt(eF.tD)||0,parseInt(eF.tY)||0)+cn(parseInt(eF.mD)||0,parseInt(eF.mY)||0)+cn(parseInt(eF.fD)||0,parseInt(eF.fY)||0)+cn(parseInt(eF.sD)||0,parseInt(eF.sY)||0)).toFixed(1)}</div></div></div>
            <Btn onClick={addExam} className="w-full">Kaydet (+25 XP)</Btn></div>
        </Modal>

        <Modal isOpen={modal.open&&modal.type==='mistake'} onClose={()=>setModal({open:false,type:null})} title="📕 Hata Ekle">
            <div className="space-y-3"><Sel label="Ders" value={mF.subject} onChange={v=>setMF(p=>({...p,subject:v}))} options={SUBS.map(s=>({value:s.id,label:s.name}))}/><Inp label="Konu" value={mF.topic} onChange={v=>setMF(p=>({...p,topic:v}))}/><Sel label="Tür" value={mF.type} onChange={v=>setMF(p=>({...p,type:v}))} options={MTYPES.map(t=>({value:t.id,label:t.name}))}/><Txt label="Hata" value={mF.desc} onChange={v=>setMF(p=>({...p,desc:v}))}/><Txt label="Doğrusu" value={mF.logic} onChange={v=>setMF(p=>({...p,logic:v}))}/><Btn onClick={addMistake} className="w-full">Kaydet (+5 XP)</Btn></div>
        </Modal>

        <Modal isOpen={modal.open&&modal.type==='task'} onClose={()=>setModal({open:false,type:null})} title="✅ Görev Ekle">
            <div className="space-y-3"><Inp label="Görev" value={tI.text} onChange={v=>setTI(p=>({...p,text:v}))} placeholder="Matematik – 20 soru"/><Sel label="Ders" value={tI.subject} onChange={v=>setTI(p=>({...p,subject:v}))} options={[{value:'genel',label:'Genel'},...SUBS.map(s=>({value:s.id,label:s.name}))]}/>
            <Btn onClick={()=>{if(!tI.text){notify('⚠️');return}setTasks(p=>[...p,{id:Date.now(),date:today,text:tI.text,subject:tI.subject,completed:false,xp:10}]);setTI({text:'',subject:'matematik'});setModal({open:false,type:null});notify('✅!')}} className="w-full">Ekle</Btn></div>
        </Modal>

        <Toast msg={toast.msg} show={toast.show}/>
    </div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
